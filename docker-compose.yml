services:
  # ── Redis (broker + result backend + pub/sub) ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tinyteemo-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - teemo-net

  # ── FastAPI app ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: tinyteemo
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      UPLOAD_DIR: /data/uploads
      LOG_DIR: /data/logs
      INVALID_ROWS_DIR: /data/invalid_rows
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploads:/data/uploads
      - logs:/data/logs
      - invalid_rows:/data/invalid_rows
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - teemo-net

  # ── Celery worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: tinyteemo-worker
    restart: unless-stopped
    command: >
      celery -A app.worker.celery_app worker
      --loglevel=info
      --queues=etl.default,etl.dlq
      --concurrency=4
    env_file:
      - .env
    environment:
      UPLOAD_DIR: /data/uploads
      LOG_DIR: /data/logs
      INVALID_ROWS_DIR: /data/invalid_rows
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
    volumes:
      - uploads:/data/uploads
      - logs:/data/logs
      - invalid_rows:/data/invalid_rows
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - teemo-net

  # ── Celery Flower (monitoring dashboard) ──────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: tinyteemo-flower
    restart: unless-stopped
    command: >
      celery -A app.worker.celery_app flower
      --port=5555
      --broker=redis://redis:6379/0
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    networks:
      - teemo-net

  # ── Dev service ────────────────────────────────────────────────────────────
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: tinyteemo-dev
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      UPLOAD_DIR: /tmp/teemo/uploads
      LOG_DIR: /tmp/teemo/logs
      INVALID_ROWS_DIR: /tmp/teemo/invalid_rows
      SECRET_KEY: dev-secret-key
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
      PATH: /app/.venv/bin:/usr/local/bin:/usr/bin:/bin
    volumes:
      - ./app:/app/app
      - ./main.py:/app/main.py
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - teemo-net
    command: >
      python -m uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
    profiles: [dev]

  # ── Test runner ────────────────────────────────────────────────────────────
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    container_name: tinyteemo-test
    profiles: [test]
    environment:
      SECRET_KEY: test-secret-key
      UPLOAD_DIR: /tmp/teemo/uploads
      LOG_DIR: /tmp/teemo/logs
      INVALID_ROWS_DIR: /tmp/teemo/invalid_rows
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./app:/app/app:ro
      - ./tests:/app/tests:ro
      - ./main.py:/app/main.py:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - teemo-net
    entrypoint: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]

  # ── Local dev databases (profile: local-db) ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tinyteemo-postgres-local
    profiles: [local-db]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teemo_dev}
      POSTGRES_USER: ${POSTGRES_USER:-teemo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teemo_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teemo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - teemo-net

  mysql:
    image: mysql:8.4
    # NOTE: The Docker service name IS the hostname inside the teemo-net network.
    # When connecting from the app/worker containers, use host: "mysql"
    # (not the container_name). The container_name is only for `docker` CLI use.
    container_name: tinyteemo-mysql-local
    profiles: [local-db]
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DB:-teemo_dev}
      MYSQL_USER: ${MYSQL_USER:-teemo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-teemo_secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "${MYSQL_USER:-teemo}",
          "--password=${MYSQL_PASSWORD:-teemo_secret}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - teemo-net

volumes:
  redis_data:
  uploads:
  logs:
  invalid_rows:
  postgres_data:
  mysql_data:

networks:
  teemo-net:
    driver: bridge
    name: teemo-network
